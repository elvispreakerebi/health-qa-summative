seed: 42
data:
  raw_dir: data/raw
  train_file: Train.csv
  val_file: Val.csv
  test_file: Test.csv
model:
  name: google/mt5-small
  max_source_length: 192
  max_target_length: 128
training:
  learning_rate: 0.00005
  epochs: 2
  batch_size: 1
  eval_batch_size: 1
  gradient_accumulation_steps: 16
  gradient_checkpointing: true
  auto_find_batch_size: true
  memory_guard: true
inference:
  batch_size: 2
  num_beams: 4
  no_repeat_ngram_size: 3
  length_penalty: 1.0
  early_stopping: true
